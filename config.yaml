# Behavior Recorder Service 配置文件

# LLM 配置
llm:
  provider: "openai"
  
  # OpenAI 兼容配置
  # ⚠️ 敏感配置已移至 .env 文件，以下配置会被环境变量覆盖
  openai:
    # API 密钥（从 LLM_API_KEY 环境变量读取）
    api_key: "${LLM_API_KEY}"
    
    # API 基础 URL（从 LLM_BASE_URL 环境变量读取）
    base_url: "${LLM_BASE_URL}"
    
    # 模型名称（从 LLM_MODEL 环境变量读取）
    model: "${LLM_MODEL}"

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8001
  debug: false

# 测试模式配置
test_mode:
  enabled: true           # 测试阶段启用
  require_auth: false     # 不需要认证
  save_history: false     # 测试数据不强制保存
  aliyun_deploy: true     # 阿里云部署
  public_access: true     # 公开访问
