# AI-Driven Quality Pipeline
# 自动执行：测试门禁 + 架构一致性 + 安全检查 + 自动合并

name: AI-Driven Quality Pipeline

on:
  push:
    branches: [main, master, develop, ai/*]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}  # 支持手动触发

env:
  PYTHON_VERSION: "3.10"
  DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 保留上一提交，用于增量 diff 计算
      
      - name: 🐍 Setup Python & Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy semgrep radon pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-ci.txt ]; then
            pip install -r requirements-ci.txt
          fi
      
      - name: 📝 Get Changed Files (Incremental)
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | tr '\n' ',')" >> $GITHUB_OUTPUT
          else
            echo "files=$(git diff --name-only HEAD~1 HEAD | tr '\n' ',')" >> $GITHUB_OUTPUT
          fi
      
      - name: 🧪 Run Trea Incremental Hook
        id: trea_hook
        run: |
          echo "🔍 执行增量测试/类型/安全门禁..."
          if [ -n "${{ steps.changed.outputs.files }}" ]; then
            python trea_hook.py --incremental --files "${{ steps.changed.outputs.files }}" > trea_report.json 2>&1 || true
          else
            echo '{"status": "✅ Passed", "message": "No changed files"}' > trea_report.json
          fi
          cat trea_report.json >> $GITHUB_STEP_SUMMARY
      
      - name: 🏛️ Run Architecture Consistency Guard
        id: arch_guard
        run: |
          echo "🏗️ 执行架构一致性检查（循环依赖/跨模块违规）..."
          python .claw/arch_guard.py --format json > arch_report.json 2>&1 || true
          cat arch_report.json >> $GITHUB_STEP_SUMMARY
      
      - name: 🔒 Run Security Scan
        id: security
        run: |
          echo "🔒 执行安全扫描..."
          python scripts/security_scan.py --format json > security_report.json 2>&1 || true
          cat security_report.json >> $GITHUB_STEP_SUMMARY
      
      - name: 📊 Evaluate Gates
        id: evaluate
        run: |
          echo "📊 评估门禁结果..."
          
          # 检查文件是否存在
          if [ ! -f trea_report.json ]; then
            echo "❌ trea_report.json 不存在"
            echo "status=FAIL" >> $GITHUB_OUTPUT
            echo "❌ 门禁未通过：trea_report.json 不存在" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          if [ ! -f arch_report.json ]; then
            echo "❌ arch_report.json 不存在"
            echo "status=FAIL" >> $GITHUB_OUTPUT
            echo "❌ 门禁未通过：arch_report.json 不存在" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # 解析 JSON 报告
          TREAS_OK=$(python -c "import json; data=json.loads(open('trea_report.json').read()); print('True' if data.get('status', '').startswith('✅') else 'False')" 2>/dev/null || echo "False")
          ARCH_OK=$(python -c "import json; data=json.loads(open('arch_report.json').read()); print('True' if data.get('status', '') == '✅ Passed' else 'False')" 2>/dev/null || echo "False")
          SECURITY_OK=$(python -c "import json; data=json.loads(open('security_report.json').read()); print('True' if data.get('status', '').startswith('✅') else 'False')" 2>/dev/null || echo "False")
          
          echo "Test Gate: $TREAS_OK"
          echo "Arch Guard: $ARCH_OK"
          echo "Security: $SECURITY_OK"
          
          if [[ "$TREAS_OK" == "True" && "$ARCH_OK" == "True" && "$SECURITY_OK" == "True" ]]; then
            echo "status=PASS" >> $GITHUB_OUTPUT
            echo "✅ 所有门禁通过！" >> $GITHUB_STEP_SUMMARY
          else
            echo "status=FAIL" >> $GITHUB_OUTPUT
            echo "❌ 门禁未通过，拦截合并。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "详细报告：" >> $GITHUB_STEP_SUMMARY
            echo "- Test: $TREAS_OK" >> $GITHUB_STEP_SUMMARY
            echo "- Arch: $ARCH_OK" >> $GITHUB_STEP_SUMMARY
            echo "- Security: $SECURITY_OK" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      
      - name: 🤖 Auto-Generate PR Summary (Optional)
        if: steps.evaluate.outputs.status == 'PASS' && github.event_name == 'pull_request'
        run: |
          echo "🤖 生成 PR 摘要..."
          python -c "
          import os, json
          # 读取报告和 diff，生成结构化 PR 描述
          print('✅ 质量报告已生成，建议附加至 PR 描述')
          " || true
      
      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results
          path: |
            trea_report.json
            arch_report.json
            security_report.json
          retention-days: 7
  
  auto-merge:
    needs: quality-gate
    if: github.event_name == 'pull_request' && needs.quality-gate.outputs.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 🔓 Auto Merge (Squash)
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
          commit-message: "chore: AI-verified merge [skip ci]"

      - name: 📝 Generate & Update PR Summary
        if: steps.evaluate.outputs.status == 'PASS' && github.event_name == 'pull_request'
        run: |
          python generate_pr_summary.py > pr_summary.md
          # 使用 gh CLI 更新 PR 描述（GitHub Actions 预装）
          gh pr edit ${{ github.event.pull_request.number }} --body-file pr_summary.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
