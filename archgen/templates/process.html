<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 流程型架构图</title>
    <style>
        {{ css }}
    </style>
</head>
<body>
    <div class="diagram-container">
        <h1 class="title">{{ title }}</h1>
        
        <div class="steps">
            {% for step in steps %}
            <div class="step">
                <div class="step-number">{{ step.order }}</div>
                <div class="step-content">
                    <h3>{{ step.title }}</h3>
                    <p>{{ step.description }}</p>
                    {% if step.tips %}
                    <div class="tips">
                        <strong>提示:</strong>
                        <ul>
                        {% for tip in step.tips %}
                            <li>{{ tip }}</li>
                        {% endfor %}
                        </ul>
                    </div>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
