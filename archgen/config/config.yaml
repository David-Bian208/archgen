ai_pulse:
  base_url: ${AI_PULSE_HOST:-http://8.130.148.166:8887}
  enabled: true
  timeout: 10
app:
  debug: false
  host: 0.0.0.0
  name: ArchGen
  port: 8972
  version: 0.1.0
  # 可选 API Key（用于服务间认证）。设置后所有敏感端点需要 X-API-Key 头。
  # 留空则跳过认证（向后兼容）。可通过环境变量 ARCHGEN_API_KEY 覆盖。
  api_key: ${ARCHGEN_API_KEY:-}
cors:
  allow_origins:
  - http://localhost:3014
  - http://localhost:3015
  - http://localhost:3016
  - http://localhost:3017
  - http://localhost:3018
  - http://localhost:3019
  - http://localhost:3020
  - http://localhost:3021
  - http://localhost:3022
  - http://localhost:3023
  - http://localhost:3024
  - http://localhost:3025
  - http://localhost:3026
  - http://localhost:8926
  - http://localhost:8948
database:
  path: data/archgen.db
  type: sqlite
knowledge_base:
  allowed_extensions:
  - .md
  - .txt
  - .json
  - .yaml
  mode: local
  root_path: knowledge_base
llm:
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  max_tokens: 4096
  model: deepseek-v4-flash
  provider: deepseek
  retry_delay: 2
  retry_times: 3
  temperature: 0.1
  timeout: 120
logging:
  file: logs/archgen.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
persona:
  file_path: /home/admin/Desktop/AI 博主/01-定位与策略/身份核心摘要.md
storage:
  output_dir: output
  temp_dir: data/temp
